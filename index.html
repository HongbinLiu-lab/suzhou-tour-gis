function getColor(category){
if(category=="园林") return "green";
if(category=="古镇") return "blue";
if(category=="景区") return "red";
if(category=="博物馆") return "purple";
if(category=="书店") return "orange";
if(category=="步行街") return "brown";
return "black";
}

var geoLayer;

function loadData(filterTypes){

if(geoLayer){
map.removeLayer(geoLayer);
}

geoLayer=L.geoJSON(scenicData,{

filter:function(feature){
return filterTypes.includes(feature.properties.category);
},

pointToLayer:function(feature,latlng){
return L.circleMarker(latlng,{
radius:8,
fillColor:getColor(feature.properties.category),
color:"#fff",
weight:1,
fillOpacity:0.9
});
},

onEachFeature:function(feature,layer){
layer.bindPopup(
"<b>"+feature.properties.name+"</b><br>"+
"类型："+feature.properties.category+"<br>"+
"区域："+feature.properties.district+"<br>"+
"热度："+feature.properties.heat+"<br><br>"+
"<a href='"+feature.properties.url+
"' target='_blank'>📖 百度百科</a>"
);
}

}).addTo(map);
}

f.geometry.coordinates[1],
f.geometry.coordinates[0],

]);

radius:45,
blur:35,

0.9: 'red',
1.0: 'darkred'
}
}).addTo(map);

}

// ======================
// 附近景点
// ======================
var tempLayers = [];

function clearTempLayers(){
  tempLayers.forEach(l => map.removeLayer(l));
  tempLayers = [];
}

function searchNearbyPoint(latlng, radius){
  clearTempLayers();
  
  var circle = L.circle(latlng, {
    radius: radius,
    color: "blue",
    fillOpacity: 0.1
  }).addTo(map);
  tempLayers.push(circle);
  
  map.setView(latlng, 14);
  
  var count = 0;
  scenicData.features.forEach(f => {
    var p = L.latLng(f.geometry.coordinates[1], f.geometry.coordinates[0]);
    if(latlng.distanceTo(p) <= radius){
      count++;
      var marker = L.marker(p)
        .addTo(map)
        .bindPopup(`范围内景点：${f.properties.name}`);
      tempLayers.push(marker);
    }
  });
  
  var centerMarker = L.marker(latlng)
    .addTo(map)
    .bindPopup(`查询点<br>半径 ${radius/1000} km<br>景点数：${count}`)
    .openPopup();
  tempLayers.push(centerMarker);
}

map.on('click', function(e){
  var r = prompt("请输入查询半径（公里）：\n3 = 3公里\n5 = 5公里", "3");
  if(!r) return;
  var km = parseFloat(r);
  if(isNaN(km) || km < 1 || km >10) {
    alert("请输入1-10之间的数字");
    return;
  }
  searchNearbyPoint(e.latlng, km * 1000);
});

function findNearby(){
  navigator.geolocation.getCurrentPosition(pos=>{
    var user = L.latLng(pos.coords.latitude, pos.coords.longitude);
    searchNearbyPoint(user, 3000);
  });
}

// 计算两点距离
function getDistance(lat1,lng1,lat2,lng2){
  let p1 = L.latLng(lat1,lng1);
  let p2 = L.latLng(lat2,lng2);
  return p1.distanceTo(p2);
}

// 路线1：经典热度路线（原逻辑完全保留）
function getClassicRoute(list, total){
  list.sort((a,b)=>b.properties.heat - a.properties.heat);
  let candidate = list.slice(0, total + 2);
  let sorted = [candidate[0]];
  let rest = candidate.slice(1);

  while(rest.length > 0 && sorted.length < total){
    let last = sorted[sorted.length - 1];
    let lastLat = last.geometry.coordinates[1];
    let lastLng = last.geometry.coordinates[0];
    rest.sort((x,y)=>{
      let d1 = getDistance(lastLat,lastLng, x.geometry.coordinates[1],x.geometry.coordinates[0]);
      let d2 = getDistance(lastLat,lastLng, y.geometry.coordinates[1],y.geometry.coordinates[0]);
      return d1 - d2;
    });
    sorted.push(rest.shift());
  }
  return sorted.slice(0, total);
}

// 路线2：区域集中路线（优先同区域，减少跨区）
function getAreaRoute(list, total){
  // 按区域分组，统计每个区域的景点数
  let areaMap = {};
  list.forEach(item => {
    if(!areaMap[item.properties.district]) areaMap[item.properties.district] = [];
    areaMap[item.properties.district].push(item);
  });

  // 按区域内景点热度排序
  for(let area in areaMap){
    areaMap[area].sort((a,b)=>b.properties.heat - a.properties.heat);
  }

  // 优先选景点多的区域，集中安排
  let sortedAreas = Object.keys(areaMap).sort((a,b)=>areaMap[b].length - areaMap[a].length);
  let result = [];
  sortedAreas.forEach(area => {
    result = result.concat(areaMap[area]);
  });

  return result.slice(0, total);
}

// 路线3：小众深度路线（中高热度，避开顶流）
function getNicheRoute(list, total){
  // 筛选热度70-90的小众景点，避开90+的顶流
  let nicheList = list.filter(item => item.properties.heat >=70 && item.properties.heat <=90);
  if(nicheList.length < total) nicheList = list; // 数量不够就补全
  nicheList.sort((a,b)=>b.properties.heat - a.properties.heat);
  
  // 就近排序
  let candidate = nicheList.slice(0, total + 2);
  let sorted = [candidate[0]];
  let rest = candidate.slice(1);

  while(rest.length > 0 && sorted.length < total){
    let last = sorted[sorted.length - 1];
    let lastLat = last.geometry.coordinates[1];
    let lastLng = last.geometry.coordinates[0];
    rest.sort((x,y)=>{
      let d1 = getDistance(lastLat,lastLng, x.geometry.coordinates[1],x.geometry.coordinates[0]);
      let d2 = getDistance(lastLat,lastLng, y.geometry.coordinates[1],y.geometry.coordinates[0]);
      return d1 - d2;
    });
    sorted.push(rest.shift());
  }
  return sorted.slice(0, total);
}

  // 读取勾选偏好
  let prefers = [];
  if(document.getElementById("p1").checked) prefers.push("园林");
  if(document.getElementById("p2").checked) prefers.push("古镇");
  if(document.getElementById("p3").checked) prefers.push("景区");
  if(document.getElementById("p4").checked) prefers.push("博物馆");
  if(document.getElementById("p5").checked) prefers.push("书店");
  if(document.getElementById("p6").checked) prefers.push("步行街");

  if(prefers.length === 0){
    alert("请至少选择一种偏好！");
    return;
  }

  let days = parseInt(document.getElementById("days").value);
  let total = days === 1 ? 4 : days === 2 ? 6 : 6;

  // 筛选偏好景点
  let list = scenicData.features.filter(f => prefers.includes(f.properties.category));
  if(list.length === 0){
    alert("未找到该类型景点");
    return;
  }

  // 选择路线类型
  let routeType = prompt(
    "请选择推荐路线类型（输入数字）：\n1. 经典热度路线（原逻辑，首次来苏首选）\n2. 区域集中路线（少跨区，轻松出行）\n3. 小众深度路线（二刷/人少景美）",
    "1"
  );
  if(!routeType) return;
  routeType = parseInt(routeType);
  if(isNaN(routeType) || routeType <1 || routeType>3) routeType =1;

  // 生成对应路线
  let selected;
  let routeName;
  switch(routeType){
    case 1:
      selected = getClassicRoute(list, total);
      routeName = "经典热度路线";
      break;
    case 2:
      selected = getAreaRoute(list, total);
      routeName = "区域集中路线";
      break;
    case 3:
      selected = getNicheRoute(list, total);
      routeName = "小众深度路线";
      break;
  }

  // 绘制路线（和你原来的逻辑完全一致，没动）
  var points = [];
  var info = `【${routeName}】\n偏好：${prefers.join("、")}\n天数：${days}天\n\n`;

  selected.forEach((item, idx) => {
    var p = L.latLng(
      item.geometry.coordinates[1],
      item.geometry.coordinates[0]
    );
    points.push(p);
    var dayNum = Math.floor(idx / (total/days)) + 1;
    info += `Day${dayNum}：${item.properties.name}（${item.properties.category}）\n`;
    var m = L.marker(p).addTo(map).bindPopup(`Day${dayNum}：${item.properties.name}`);
    routeLayers.push(m);
  });

  var line = L.polyline(points, { color: "red", weight: 4, opacity: 0.7 }).addTo(map);
  routeLayers.push(line);
  map.fitBounds(line.getBounds(), { padding: [50,50] });
  alert(info);
}

</script>
